<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Анкета пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg p-4 mb-4">
                <h2 class="text-center mb-4">Анкета пользователя</h2>

                <form action="/" method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Имя</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="town" class="form-label">Город</label>
                        <input type="text" class="form-control" id="town" name="town" required>
                    </div>

                    <div class="mb-3">
                        <label for="hobby" class="form-label">Хобби</label>
                        <input type="text" class="form-control" id="hobby" name="hobby" required>
                    </div>

                    <div class="mb-3">
                        <label for="age" class="form-label">Возраст</label>
                        <input type="number" class="form-control" id="age" name="age">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Отправить</button>
                    </div>
                </form>
            </div>

            {% if users %}
            <div class="card shadow-sm p-4">
                <h3 class="mb-3">Отправленные анкеты</h3>
                {% for user in users %}
                    <div class="border rounded p-3 mb-3">
                        <p><strong>Имя:</strong> {{ user.name }}</p>
                        <p><strong>Город:</strong> {{ user.town }}</p>
                        <p><strong>Хобби:</strong> {{ user.hobby }}</p>
                        <p><strong>Возраст:</strong> {{ user.age }}</p>
                    </div>
                {% endfor %}
            </div>
            {% endif %}

        </div>
    </div>
</div>

</body>
</html>
